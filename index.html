<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2196F3">
    <meta name="description" content="An interactive frog spinning game as a Progressive Web App">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48dGV4dCB4PSI1MCIgeT0iNzAiIGZvbnQtc2l6ZT0iODAiIHRleHQtYW5jaG9yPSJtaWRkbGUiPvCbjronPC90ZXh0Pjwvc3ZnPg==">
    <title>Frogs</title>
    <style>
      img {
        cursor: pointer;
      }
      img.spinning {
        animation: spin 0.6s ease-in-out;
      }
      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <h1>Frogs</h1>
    <p>This site is about frogs. Here is one cool fact: Frogs are amphibians that can live both on land and in water.</p>
    <p><a href="https://en.wikipedia.org/wiki/Frog">Frog Wikipedia Page</a></p>
    <img id="frog-image" src="frog.jpg" alt="A picture of a frog" />
    <p id="spin-counter">Spins: 0</p>

    <script>
      // Register service worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js').then(registration => {
          console.log('Service Worker registered:', registration);
        }).catch(error => {
          console.log('Service Worker registration failed:', error);
        });
      }

      let spinCount = 0;
      const frogImage = document.getElementById('frog-image');
      const counterDisplay = document.getElementById('spin-counter');

      frogImage.addEventListener('click', function() {
        spinCount++;
        counterDisplay.textContent = `Spins: ${spinCount}`;

        // Remove the class if it exists to reset the animation
        frogImage.classList.remove('spinning');
        // Trigger reflow to restart animation
        void frogImage.offsetWidth;
        // Add the spinning class
        frogImage.classList.add('spinning');
      });
    </script>
  </body>
</html>
